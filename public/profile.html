        }

        .serif-title {

        }

        .premium-card {

            border: 2px solid #fbcfe8;
            box-shadow: 0 15px 30px rgba(219, 39, 119, 0.1);
        }

        .btn-premium {
            background: linear-gradient(135deg, #ec4899 0%, #3b82f6 100%);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            border-radius: 18px;
            box-shadow: 0 10px 0 rgba(30, 64, 175, 0.16), 0 18px 36px rgba(15, 23, 42, 0.12);
            transition: transform .25s ease, box-shadow .25s ease;
        }

        .btn-premium:hover {
            transform: translateY(-2px) rotateX(4deg);
            box-shadow: 0 6px 0 rgba(30, 64, 175, 0.18), 0 20px 38px rgba(236, 72, 153, 0.2);
        }

        .toy-soft-button {
            border-radius: 18px;
            box-shadow: inset 0 -4px 0 rgba(15, 23, 42, 0.07), 0 14px 24px rgba(59, 130, 246, 0.12);
        }

        .profile-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 7px 11px;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: .04em;
            text-transform: uppercase;
            background: #eff6ff;
            color: #1e3a8a;
            border: 1px solid #bfdbfe;
        }

        .trust-badge {
            border-radius: 16px;
            padding: 14px;
            background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(240,253,244,.9));
            border: 1px solid rgba(187, 247, 208, .9);
        }

        @keyframes floatSmall {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(4deg); }
        }

        .floating-element {
            animation: floatSmall 4s ease-in-out infinite;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            border-radius: 16px;
            padding: 14px;
            background: rgba(255, 255, 255, .92);
            border: 1px solid #dbeafe;
        }

        .schedule-table {
            width: 100%;
            min-width: 720px;
            border-collapse: separate;
            border-spacing: 6px;
        }

        .schedule-table th {
            padding: 8px 6px;
            color: #64748b;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        .schedule-table td {
            padding: 10px 7px;
            border-radius: 12px;
            text-align: center;
            font-size: 10px;
            font-weight: 900;
        }

        .schedule-available {
            background: #dcfce7;
            color: #047857;
            border: 1px solid #bbf7d0;
        }

        .schedule-busy {
            background: #f1f5f9;
            color: #94a3b8;
            border: 1px solid #e2e8f0;
        }

        .favorite-active {
            background: #fff1f2;
            color: #be123c;
            border-color: #fecdd3;
        }
    </style>
</head>

        const sitter = sittersData.find(item => item.id === Number(params.get('id'))) || sittersData[0];

        function chips(items, icon, classes = "") {
            return items.map(item => `<span class="profile-chip ${classes}"><i class="fa-solid ${icon}"></i>${item}</span>`).join('');
        }

        const schedulePeriods = ["08:00-12:00", "09:00-12:00", "10:00-14:00", "14:00-18:00", "18:00-22:00"];

        function getFavorites() {
            try {
                return JSON.parse(localStorage.getItem('aldayeFavorites') || '[]').map(Number);
            } catch {
                return [];
            }
        }

        function isFavorite() {
            return getFavorites().includes(sitter.id);
        }

        function toggleFavorite() {
            const favorites = getFavorites();
            const updated = favorites.includes(sitter.id)
                ? favorites.filter(id => id !== sitter.id)
                : [...favorites, sitter.id];

            localStorage.setItem('aldayeFavorites', JSON.stringify(updated));
            updateFavoriteButton();
        }

        function updateFavoriteButton() {
            const button = document.getElementById('favoriteButton');
            const note = document.getElementById('favoriteNote');
            if (!button) return;

            const active = isFavorite();
            button.classList.toggle('favorite-active', active);
            button.innerHTML = active
                ? '<i class="fa-solid fa-heart mr-1.5"></i> Favorilərdən çıxar'
                : '<i class="fa-regular fa-heart mr-1.5"></i> Favorilərə əlavə et';
            note.textContent = active
                ? 'Bu dayə ailənizin seçim siyahısına əlavə edilib.'
                : 'Bəyəndiyiniz dayəni saxlayın və sifariş zamanı siyahıdan seçin.';
        }

                            <tr>

                                ${schedulePeriods.map(period => `<th>${period}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody>
                            ${days.map(day => `
                                <tr>
                                    <td class="bg-blue-50 text-blue-950 border border-blue-100">${day}</td>
                                    ${schedulePeriods.map(period => {
                                        const available = sitter.availability[day].includes(period);
                                        return `<td class="${available ? 'schedule-available' : 'schedule-busy'}">
                                            <i class="fa-solid ${available ? 'fa-check' : 'fa-minus'} mr-1"></i>
                                            ${available ? 'Uyğundur' : 'Dolu'}
                                        </td>`;
                                    }).join('')}
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function bookingUrl() {
            if (!isFavorite()) {
                const favorites = getFavorites();
                localStorage.setItem('aldayeFavorites', JSON.stringify([...favorites, sitter.id]));
            }
            return `parent-register.html?nanny=${sitter.id}#booking`;
        }

        function goToBooking() {
            window.location.href = bookingUrl();

                                    <p class="text-sm font-bold text-slate-600">${sitter.education}</p>
                                    <p class="text-sm font-bold text-slate-600 mt-1">${sitter.languages.join(', ')}</p>
                                </div>
                                <div class="bg-pink-50/70 border-2 border-pink-100 rounded-3xl p-5">
                                    <h2 class="text-lg font-black text-blue-950 serif-title mb-2">Valideyn rəyi</h2>
                                    <p class="text-sm font-semibold text-slate-600 leading-relaxed">"${sitter.review}"</p>
                                </div>
                            </section>

                            <section class="bg-blue-50/60 border-2 border-blue-100 rounded-3xl p-5 space-y-4">

                                </div>
                                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                    <div class="detail-item"><i class="fa-solid fa-ring text-pink-500 mt-1"></i><div><div class="text-[9px] font-black uppercase tracking-widest text-slate-400">Ailə vəziyyəti</div><div class="text-sm font-black text-blue-950">${sitter.maritalStatus}</div></div></div>
                                    <div class="detail-item"><i class="fa-solid fa-children text-blue-500 mt-1"></i><div><div class="text-[9px] font-black uppercase tracking-widest text-slate-400">Öz övladları</div><div class="text-sm font-black text-blue-950">${sitter.hasChildren}</div></div></div>
                                    <div class="detail-item"><i class="fa-solid fa-ban-smoking text-emerald-500 mt-1"></i><div><div class="text-[9px] font-black uppercase tracking-widest text-slate-400">Siqaret</div><div class="text-sm font-black text-blue-950">${sitter.smoking}</div></div></div>
                                    <div class="detail-item"><i class="fa-solid fa-id-card text-amber-500 mt-1"></i><div><div class="text-[9px] font-black uppercase tracking-widest text-slate-400">Sürücülük vəsiqəsi</div><div class="text-sm font-black text-blue-950">${sitter.driversLicense}</div></div></div>
                                    <div class="detail-item"><i class="fa-solid fa-car text-violet-500 mt-1"></i><div><div class="text-[9px] font-black uppercase tracking-widest text-slate-400">Avtomobil</div><div class="text-sm font-black text-blue-950">${sitter.hasCar}</div></div></div>
                                    <div class="detail-item"><i class="fa-solid fa-broom text-cyan-500 mt-1"></i><div><div class="text-[9px] font-black uppercase tracking-widest text-slate-400">Ev işləri</div><div class="text-sm font-black text-blue-950">${sitter.housework}</div></div></div>

                                    <div class="detail-item"><i class="fa-solid fa-paw text-rose-500 mt-1"></i><div><div class="text-[9px] font-black uppercase tracking-widest text-slate-400">Ev heyvanları</div><div class="text-sm font-black text-blue-950">${sitter.pets}</div></div></div>
                                    <div class="detail-item"><i class="fa-solid fa-moon text-indigo-500 mt-1"></i><div><div class="text-[9px] font-black uppercase tracking-widest text-slate-400">Gecə qalmaq</div><div class="text-sm font-black text-blue-950">${sitter.overnight}</div></div></div>
                                    <div class="detail-item"><i class="fa-solid fa-kit-medical text-red-500 mt-1"></i><div><div class="text-[9px] font-black uppercase tracking-widest text-slate-400">Təcili yardım</div><div class="text-sm font-black text-blue-950">${sitter.emergencyTraining}</div></div></div>
                                </div>
                            </section>

                            <section class="bg-white/90 border-2 border-emerald-100 rounded-3xl p-5 space-y-3">
                                <div class="flex flex-wrap items-end justify-between gap-3">
                                    <div>
                                        <h2 class="text-xl font-black text-blue-950 serif-title">Həftəlik uyğunluq cədvəli</h2>
                                        <p class="text-xs font-semibold text-slate-500 mt-1">Yaşıl xanalar dayənin sifariş üçün uyğun olduğu vaxtları göstərir.</p>
                                    </div>
                                    <div class="flex gap-2 text-[10px] font-black uppercase tracking-wider">
                                        <span class="schedule-available px-3 py-1.5 rounded-full"><i class="fa-solid fa-check mr-1"></i> Uyğundur</span>
                                        <span class="schedule-busy px-3 py-1.5 rounded-full"><i class="fa-solid fa-minus mr-1"></i> Dolu</span>
                                    </div>
                                </div>
                                ${renderSchedule()}
                            </section>

                            <section class="bg-white/80 border-2 border-blue-100 rounded-3xl p-5 flex flex-col md:flex-row md:items-center justify-between gap-4">
                                <div>
                                    <div class="text-[10px] font-black uppercase tracking-widest text-slate-400">Saatlıq qiymət</div>
                                    <div class="text-3xl font-black text-blue-950">${sitter.basePrice} AZN <span class="text-sm text-slate-500">/ saat</span></div>
                                    <div class="text-xs font-bold text-slate-500 mt-1">Boş saatlar: ${sitter.slots.join(', ')}</div>
                                </div>
                                <button onclick="goToBooking()" class="btn-premium text-white font-black px-7 py-4 text-xs uppercase tracking-widest">

            `;
        }

        renderProfile();
        updateFavoriteButton();
    </script>

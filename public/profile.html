                    <div class="flex justify-center gap-1 h-8 mt-4">

                    </div>

                <video id="localCallVideo" class="hidden w-full aspect-video object-cover rounded-2xl bg-black my-6" autoplay muted playsinline></video>
                <div class="flex justify-center gap-3">
                    <button id="startCallButton" onclick="startInAppCall()" class="bg-emerald-500 text-white font-black px-6 py-3 rounded-2xl text-xs uppercase tracking-widest"><i class="fa-solid fa-phone mr-1"></i> Z…ôngi baŇülat</button>
                    <button onclick="closeCallModal()" class="bg-rose-600 text-white font-black px-6 py-3 rounded-2xl text-xs uppercase tracking-widest"><i class="fa-solid fa-phone-slash mr-1"></i> Bitir</button>
                </div>

    <script>
        let currentCallType = 'audio';
        let activeCallStream = null;

        function openCallModal(type) {
            currentCallType = type;
            callTitle.textContent = `${sitter.name} il…ô ${type === 'video' ? 'video' : 's…ôsli'} z…ông`;
            callAvatar.src = sitter.avatar;
            callStatus.textContent = 'Ňě…ôxsi telefon n√∂mr…ôsi qarŇüńĪ t…ôr…ôf…ô g√∂st…ôrilmir.';
            startCallButton.innerHTML = `<i class="fa-solid ${type === 'video' ? 'fa-video' : 'fa-phone'} mr-1"></i> Z…ôngi baŇülat`;
            audioCallVisual.classList.remove('hidden');
            localCallVideo.classList.add('hidden');
            callModal.classList.remove('hidden');
            callModal.classList.add('flex');
        }

        async function startInAppCall() {
            try {
                activeCallStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:currentCallType === 'video' });
                if (currentCallType === 'video') {
                    localCallVideo.srcObject = activeCallStream;
                    localCallVideo.classList.remove('hidden');
                    audioCallVisual.classList.add('hidden');
                }
                callStatus.textContent = 'T…ôtbiqdaxili z…ông otańüńĪ aktivdir. Day…ôy…ô qoŇüulma sorńüusu g√∂nd…ôrildi.';
                startCallButton.disabled = true;
                startCallButton.classList.add('opacity-50');
            } catch {
                callStatus.textContent = 'Z…ông √ľ√ß√ľn mikrofon v…ô kamera icaz…ôsi lazńĪmdńĪr. Brauzer icaz…ôsini aktiv edib yenid…ôn sńĪnayńĪn.';
            }
        }

        function closeCallModal() {
            if (activeCallStream) {
                activeCallStream.getTracks().forEach(track => track.stop());
                activeCallStream = null;
            }
            localCallVideo.srcObject = null;
            startCallButton.disabled = false;
            startCallButton.classList.remove('opacity-50');
            callModal.classList.add('hidden');
            callModal.classList.remove('flex');
        }
    </script>

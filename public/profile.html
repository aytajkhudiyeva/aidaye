<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aldayə - Dayə profili</title>
    <meta name="description" content="Aldayə dayə profili: təcrübə, sənədlər, referanslar, bacarıqlar, rəylər və uyğun saatlar.">
    <meta name="theme-color" content="#ec4899">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f7ff;
            background-image: radial-gradient(#fbcfe8 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }

        .serif-title {
            font-family: 'Playfair Display', serif;
        }

        .premium-card {
            background: rgba(255, 255, 255, 0.96);
            border: 2px solid #fbcfe8;
            box-shadow: 0 15px 30px rgba(219, 39, 119, 0.1);
        }

        .btn-premium {
            background: linear-gradient(135deg, #ec4899 0%, #3b82f6 100%);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            border-radius: 18px;
            box-shadow: 0 10px 0 rgba(30, 64, 175, 0.16), 0 18px 36px rgba(15, 23, 42, 0.12);
            transition: transform .25s ease, box-shadow .25s ease;
        }

        .btn-premium:hover {
            transform: translateY(-2px) rotateX(4deg);
            box-shadow: 0 6px 0 rgba(30, 64, 175, 0.18), 0 20px 38px rgba(236, 72, 153, 0.2);
        }

        .toy-soft-button {
            border-radius: 18px;
            box-shadow: inset 0 -4px 0 rgba(15, 23, 42, 0.07), 0 14px 24px rgba(59, 130, 246, 0.12);
        }

        .profile-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 7px 11px;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: .04em;
            text-transform: uppercase;
            background: #eff6ff;
            color: #1e3a8a;
            border: 1px solid #bfdbfe;
        }

        .trust-badge {
            border-radius: 16px;
            padding: 14px;
            background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(240,253,244,.9));
            border: 1px solid rgba(187, 247, 208, .9);
        }

        @keyframes floatSmall {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(4deg); }
        }

        .floating-element {
            animation: floatSmall 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="p-4 md:p-10 text-slate-800 antialiased">
    <div class="max-w-6xl mx-auto space-y-6">
        <nav class="premium-card rounded-2xl px-4 py-3 flex flex-wrap justify-between items-center gap-3 sticky top-3 z-30">
            <a href="index.html#search" class="toy-soft-button bg-white text-blue-950 border-2 border-blue-100 font-black px-4 py-2 text-xs uppercase tracking-widest">
                <i class="fa-solid fa-arrow-left mr-1.5 text-pink-500"></i> Axtarışa qayıt
            </a>
            <a href="index.html" class="flex items-center gap-2 text-blue-950 font-black">
                <span class="w-9 h-9 rounded-xl bg-gradient-to-tr from-pink-500 to-blue-500 text-white flex items-center justify-center shadow-md">
                    <i class="fa-solid fa-feather-pointed"></i>
                </span>
                Aldayə
            </a>
        </nav>

        <main id="profileRoot"></main>
    </div>

    <script>
        const sittersData = [
            {
                id: 1,
                name: "Nərgiz Qasımova",
                city: "Bakı",
                experience: 7,
                languages: ["Azərbaycan"],
                maxChildren: 1,
                basePrice: 5,
                distanceKm: 3.1,
                online: true,
                rating: 5.0,
                slots: ["09:00", "11:00", "14:00", "16:00"],
                age: 32,
                responseTime: "12 dəq",
                lastActive: "Bu gün aktiv",
                references: 4,
                repeatFamilies: 18,
                education: "Məktəbəqədər təhsil",
                services: ["daye", "ders"],
                serviceLabels: ["Dayə", "Məktəbə hazırlıq", "Ev tapşırığı dəstəyi"],
                skills: ["Nağıl oxuma", "Sakitləşdirici oyunlar", "İlk yardım biliyi", "Qida rejimi"],
                careAges: ["1-3 yaş", "4-6 yaş"],
                verifications: ["SİMA ID", "Məhkumluq arayışı", "Referans yoxlanışı"],
                bio: "7 illik təcrübəm var. Uşaqlarla sakit, ritmli gün planı qurmağı və valideynlə gündəlik hesabat paylaşmağı sevirəm.",
                review: "Nərgiz xanım uşağımızla çox tez bağ qurdu, vaxtında gəldi və günün sonunda hər şeyi izah etdi.",
                avatar: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&q=80&w=420&h=420"
            },
            {
                id: 2,
                name: "Fatimə Həsənli",
                city: "Sumqayıt",
                experience: 3,
                languages: ["Azərbaycan", "Rus"],
                maxChildren: 3,
                basePrice: 4,
                distanceKm: 4.8,
                online: true,
                rating: 4.9,
                slots: ["10:00", "13:00", "15:00"],
                age: 27,
                responseTime: "25 dəq",
                lastActive: "Dünən aktiv",
                references: 2,
                repeatFamilies: 9,
                education: "Psixologiya üzrə bakalavr",
                services: ["daye", "gece"],
                serviceLabels: ["Dayə", "Gecə baxımı", "Körpə rutini"],
                skills: ["Körpə baxımı", "Yuxu rutini", "Gigiyena", "Sakit ünsiyyət"],
                careAges: ["0-12 ay", "1-3 yaş"],
                verifications: ["SİMA ID", "Video təqdimat", "Referans yoxlanışı"],
                bio: "Körpə və azyaşlı uşaqlarla işləməyi sevirəm. Gecə baxımı və yuxu rejimi mövzularında ailələrə dəstək verirəm.",
                review: "Fatimə xanım çox diqqətli idi, körpəmizin rejiminə tam uyğunlaşdı.",
                avatar: "https://images.unsplash.com/photo-1567532939604-b6b5b0db2604?auto=format&fit=crop&q=80&w=420&h=420"
            },
            {
                id: 3,
                name: "Aysel Məmmədova",
                city: "Bakı",
                experience: 5,
                languages: ["Azərbaycan", "İngilis"],
                maxChildren: 2,
                basePrice: 6,
                distanceKm: 6.2,
                online: true,
                rating: 5.0,
                slots: ["08:00", "12:00", "17:00"],
                age: 29,
                responseTime: "8 dəq",
                lastActive: "İndi aktiv",
                references: 5,
                repeatFamilies: 21,
                education: "İbtidai sinif müəllimliyi",
                services: ["daye", "ders"],
                serviceLabels: ["Dayə", "İngilis dili", "Dərs dəstəyi"],
                skills: ["İngilis dili", "Yaradıcı məşğələ", "Xüsusi qayğı dəstəyi", "Oxu vərdişi"],
                careAges: ["4-6 yaş", "7-10 yaş"],
                verifications: ["SİMA ID", "Məhkumluq arayışı", "Təhsil sənədi"],
                bio: "İbtidai yaşlı uşaqlara dərs dəstəyi, yaradıcı oyunlar və dil praktikası ilə kömək edirəm. Valideynlə planlı ünsiyyət saxlayıram.",
                review: "Aysel xanım həm dayə, həm də dərs dəstəyi kimi çox faydalı oldu.",
                avatar: "https://images.unsplash.com/photo-1580489944761-15a19d654956?auto=format&fit=crop&q=80&w=420&h=420"
            }
        ];

        const params = new URLSearchParams(window.location.search);
        const sitter = sittersData.find(item => item.id === Number(params.get('id'))) || sittersData[0];
        document.title = `Aldayə - ${sitter.name}`;

        function chips(items, icon, classes = "") {
            return items.map(item => `<span class="profile-chip ${classes}"><i class="fa-solid ${icon}"></i>${item}</span>`).join('');
        }

        function renderProfile() {
            const root = document.getElementById('profileRoot');
            root.innerHTML = `
                <section class="premium-card rounded-3xl overflow-hidden">
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-0">
                        <div class="lg:col-span-4 bg-gradient-to-br from-pink-100 via-white to-blue-100 p-8 relative overflow-hidden">
                            <div class="absolute top-6 right-8 text-6xl text-pink-200 floating-element"><i class="fa-solid fa-puzzle-piece"></i></div>
                            <div class="relative z-10 space-y-5">
                                <div class="w-40 h-40 rounded-3xl overflow-hidden p-1.5 bg-gradient-to-tr from-pink-500 to-blue-500 shadow-2xl">
                                    <img src="${sitter.avatar}" alt="${sitter.name}" class="w-full h-full object-cover rounded-2xl bg-white">
                                </div>
                                <div>
                                    <span class="inline-flex bg-emerald-500 text-white text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full items-center gap-1.5">
                                        <i class="fa-solid fa-circle-check"></i> Yoxlanılmış profil
                                    </span>
                                    <h1 class="serif-title text-4xl font-black text-blue-950 mt-3">${sitter.name}</h1>
                                    <p class="text-sm font-bold text-slate-600 mt-1">${sitter.city} · ${sitter.age} yaş · ${sitter.experience} il təcrübə</p>
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <div class="trust-badge">
                                        <div class="text-[10px] font-black uppercase tracking-widest text-slate-400">Reytinq</div>
                                        <div class="text-xl font-black text-amber-500"><i class="fa-solid fa-star"></i> ${sitter.rating.toFixed(1)}</div>
                                    </div>
                                    <div class="trust-badge">
                                        <div class="text-[10px] font-black uppercase tracking-widest text-slate-400">Cavab</div>
                                        <div class="text-xl font-black text-emerald-600">${sitter.responseTime}</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="lg:col-span-8 p-8 space-y-7">
                            <div class="flex flex-wrap gap-2">
                                ${chips(sitter.serviceLabels, 'fa-heart', 'bg-pink-50 text-pink-700 border-pink-100')}
                            </div>

                            <section>
                                <h2 class="text-xl font-black text-blue-950 serif-title mb-2">Haqqında</h2>
                                <p class="text-sm text-slate-600 font-semibold leading-relaxed">${sitter.bio}</p>
                            </section>

                            <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                                <div class="trust-badge">
                                    <div class="text-[10px] font-black uppercase tracking-widest text-slate-400">Referans</div>
                                    <div class="text-lg font-black text-blue-950">${sitter.references} yoxlanmış</div>
                                </div>
                                <div class="trust-badge">
                                    <div class="text-[10px] font-black uppercase tracking-widest text-slate-400">Təkrar ailə</div>
                                    <div class="text-lg font-black text-blue-950">${sitter.repeatFamilies}</div>
                                </div>
                                <div class="trust-badge">
                                    <div class="text-[10px] font-black uppercase tracking-widest text-slate-400">Məsafə</div>
                                    <div class="text-lg font-black text-blue-950">${sitter.distanceKm} km</div>
                                </div>
                                <div class="trust-badge">
                                    <div class="text-[10px] font-black uppercase tracking-widest text-slate-400">Son aktivlik</div>
                                    <div class="text-lg font-black text-blue-950">${sitter.lastActive}</div>
                                </div>
                            </section>

                            <section class="grid grid-cols-1 md:grid-cols-2 gap-5">
                                <div class="bg-white/80 border-2 border-blue-100 rounded-3xl p-5 space-y-3">
                                    <h2 class="text-lg font-black text-blue-950 serif-title">Bacarıqlar</h2>
                                    <div class="flex flex-wrap gap-2">${chips(sitter.skills, 'fa-puzzle-piece', 'bg-blue-50 text-blue-700 border-blue-100')}</div>
                                </div>
                                <div class="bg-white/80 border-2 border-amber-100 rounded-3xl p-5 space-y-3">
                                    <h2 class="text-lg font-black text-blue-950 serif-title">Baxdığı yaş qrupları</h2>
                                    <div class="flex flex-wrap gap-2">${chips(sitter.careAges, 'fa-child-reaching', 'bg-amber-50 text-amber-700 border-amber-100')}</div>
                                </div>
                            </section>

                            <section class="bg-emerald-50/70 border-2 border-emerald-100 rounded-3xl p-5 space-y-3">
                                <h2 class="text-lg font-black text-blue-950 serif-title">Güvən və sənədlər</h2>
                                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                    ${sitter.verifications.map(item => `
                                        <div class="trust-badge text-sm font-black text-emerald-800 flex items-center gap-2">
                                            <i class="fa-solid fa-circle-check text-emerald-500"></i>${item}
                                        </div>
                                    `).join('')}
                                </div>
                            </section>

                            <section class="grid grid-cols-1 md:grid-cols-2 gap-5">
                                <div class="bg-blue-50/70 border-2 border-blue-100 rounded-3xl p-5">
                                    <h2 class="text-lg font-black text-blue-950 serif-title mb-2">Təhsil və dillər</h2>
                                    <p class="text-sm font-bold text-slate-600">${sitter.education}</p>
                                    <p class="text-sm font-bold text-slate-600 mt-1">${sitter.languages.join(', ')}</p>
                                </div>
                                <div class="bg-pink-50/70 border-2 border-pink-100 rounded-3xl p-5">
                                    <h2 class="text-lg font-black text-blue-950 serif-title mb-2">Valideyn rəyi</h2>
                                    <p class="text-sm font-semibold text-slate-600 leading-relaxed">"${sitter.review}"</p>
                                </div>
                            </section>

                            <section class="bg-white/80 border-2 border-blue-100 rounded-3xl p-5 flex flex-col md:flex-row md:items-center justify-between gap-4">
                                <div>
                                    <div class="text-[10px] font-black uppercase tracking-widest text-slate-400">Saatlıq qiymət</div>
                                    <div class="text-3xl font-black text-blue-950">${sitter.basePrice} AZN <span class="text-sm text-slate-500">/ saat</span></div>
                                    <div class="text-xs font-bold text-slate-500 mt-1">Boş saatlar: ${sitter.slots.join(', ')}</div>
                                </div>
                                <button onclick="alert('SİMA rəqəmsal imza pəncərəsi başladıldı. Müqavilə təsdiqləndikdən sonra GPS aktivləşəcək.')" class="btn-premium text-white font-black px-7 py-4 text-xs uppercase tracking-widest">
                                    <i class="fa-solid fa-baby-carriage mr-1.5"></i> Sifariş et
                                </button>
                            </section>
                        </div>
                    </div>
                </section>
            `;
        }

        renderProfile();
    </script>
</body>
</html>
